services:
  veriface:
    build:
      context: .
      dockerfile: Dockerfile
    image: veriface:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
      SSL_CERT_FILE: /app/certs/cert.pem
      SSL_KEY_FILE: /app/certs/key.pem
    ports:
      - "8443:8000"
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs:ro
